<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Alertle{% endblock %} — Alertle</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <a class="nav-brand" href="/">
      <img src="/static/favicon.png" alt="" class="nav-logo">
      <span class="nav-brand-name">Alertle</span>
    </a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation"
            onclick="toggleNav()">
      <span></span><span></span><span></span>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">Dashboard</a>
      <a href="/subscriptions" class="nav-link {% if request.url.path == '/subscriptions' %}active{% endif %}">Subscriptions</a>
      <a href="/endpoints" class="nav-link {% if request.url.path == '/endpoints' %}active{% endif %}">Endpoints</a>
      <a href="/settings" class="nav-link {% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
    </div>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
